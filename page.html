<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>อ่านการ์ตูน - ตำนานอสูรล่าวิญญาณ ตอนที่ 1</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #ffffff;
            /* เปลี่ยนพื้นหลังเป็นสีดำเพื่อให้ภาพการ์ตูนดูเด่นชัดและสบายตาเวลาอ่าน */
            color: #fff;
        }

        .navbar-webtoon {
            background-color: #fff;
            border-bottom: 1px solid #e2e2e2;
            padding-top: 15px;
            padding-bottom: 15px;
        }

        /* กล่องควบคุมความกว้างของเนื้อหาการ์ตูน */
        .webtoon-viewer {
            max-width: 700px;
            /* บังคับไม่ให้รูปการ์ตูนกว้างเกิน 700px ในจอคอม เพื่อไม่ให้ภาพแตกและกว้างเกินสายตา */
            margin: 0 auto;
            /* จัดให้อยู่กึ่งกลางหน้าจอ */
            background-color: #ffffff;
        }

        /* กำจัดช่องว่างระหว่างรูปภาพการ์ตูน */
        .webtoon-img {
            width: 100%;
            /* ยืดรูปให้เต็มความกว้างกล่อง 100% อัตโนมัติ */
            display: block;
            /* เปลี่ยนเป็น block เพื่อกำจัดช่องว่างสีดำเล็กๆ ระหว่างรอยต่อของรูป */
            height: auto;
            /* ปรับความสูงตามสัดส่วนจริงของรูป */
        }

        /* ปรับแต่งแถบควบคุมตอน (ล่างสุด) */
        .ep-navigation {
            background-color: #ffffff;
            border-top: 1px solid #ffffff;
        }
    </style>
</head>

<body>

    <nav class="navbar navbar-dark bg-light sticky-top shadow-sm">
        <div class="container">
            <a class="btn btn-outline-light btn-sm text-dark" href="http://127.0.0.1:5500/index.html">←
                กลับหน้าแรก</a>
            <span class="navbar-text fw-bold text-truncate ms-2 me-auto text-warning text-dark">
                ตำนานอสูรล่าวิญญาณ - ตอนที่ 1
            </span>
        </div>
    </nav>

    <main class="container-fluid py-4 bg-Light">
        <div class="row justify-content-center">

            <div class="col-lg-8 col-md-10 col-12">

                <img src="images/1.png" class="img-fluid w-100 mb-3 rounded shadow" alt="ตอนที่ 23 หน้า 1">
            </div>

        </div>
    </main>

    <div class="ep-navigation py-4 text-center mt-5">
        <div class="container">
            <div class="d-flex justify-content-center gap-3">
                <a href="#" class="btn btn-secondary px-4">ตอนก่อนหน้า</a>
                <a href="#" class="btn btn-warning fw-bold px-4 text-dark">ตอนถัดไป</a>
            </div>
            <p class="text-muted small mt-3">© 2026 MangaWebD. All rights reserved.</p>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
